name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (core + dev)
        run: uv sync --group dev

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: Mypy (type check)
        run: uv run mypy

      - name: Pytest
        run: uv run pytest

  agents:
    # Job dédié : installe l'extra "agents" (LangGraph) et exécute les tests
    # d'orchestration LangGraph (skippés dans le job principal faute de dépendance).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Sync dependencies (core + dev + extra agents)
        run: uv sync --group dev --extra agents

      - name: Pytest (LangGraph orchestrator)
        run: uv run pytest tests/test_graph.py -q

  api:
    # Job dédié : installe l'extra "api" (FastAPI) et exécute les tests d'API.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Sync dependencies (core + dev + extra api)
        run: uv sync --group dev --extra api

      - name: Pytest (API FastAPI)
        run: uv run pytest tests/test_api.py -q

  coverage:
    # Suite complète (tous les extras) + porte de couverture.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Sync dependencies (core + dev + api + ui + agents)
        run: uv sync --group dev --extra api --extra ui --extra agents

      - name: Pytest + coverage gate
        run: >-
          uv run pytest
          --cov=governed_omop_rag
          --cov-report=term-missing
          --cov-fail-under=70
